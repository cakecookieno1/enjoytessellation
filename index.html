<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#f76f53" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="테셀레이션" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" href="./assets/icons/icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="./assets/icons/icon-192.png" />
    <title>테셀레이션 놀이터</title>
    <link rel="stylesheet" href="./styles.css?v=20260618-pwa" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">초등 수학 체험</p>
          <h1>테셀레이션 놀이터</h1>
        </div>
        <div class="topbar-status">
          <div class="score-strip" aria-live="polite">
            <span id="tileCount">0</span>
            <small id="scoreLabel">배치한 도형</small>
          </div>
          <section class="account-panel" aria-label="사용자 계정">
            <strong id="accountStatus">손님</strong>
            <div id="loginFields" class="account-fields">
              <input id="userNameInput" type="text" maxlength="12" autocomplete="username" placeholder="이름" aria-label="이름" />
              <input id="passwordInput" type="password" maxlength="24" autocomplete="current-password" placeholder="비밀번호" aria-label="비밀번호" />
              <button id="loginButton" class="account-button" type="button">입장</button>
            </div>
            <button id="logoutButton" class="account-button ghost" type="button" hidden>나가기</button>
          </section>
        </div>
      </header>

      <section class="workspace" aria-label="테셀레이션 만들기">
        <aside class="panel tools-panel">
          <div class="mode-switch" role="tablist" aria-label="활동 모드">
            <button class="mode-button active" data-mode="free" role="tab" aria-selected="true">자유</button>
            <button class="mode-button" data-mode="template" role="tab" aria-selected="false">도안</button>
            <button class="mode-button" data-mode="decorate" role="tab" aria-selected="false">꾸미기</button>
          </div>

          <div id="templatePanel" class="panel-section template-panel" hidden>
            <h2>아르키메데스 도안</h2>
            <div class="template-picker" role="group" aria-label="도안 선택">
              <button class="template-button active" data-template="t31212">
                <span>(3, 12²)</span>
                <small>3조각</small>
              </button>
              <button class="template-button" data-template="t4612">
                <span>(4, 6, 12)</span>
                <small>3조각</small>
              </button>
              <button class="template-button" data-template="t488">
                <span>(4, 8²)</span>
                <small>3조각</small>
              </button>
              <button class="template-button" data-template="t3464">
                <span>(3, 4, 6, 4)</span>
                <small>4조각</small>
              </button>
              <button class="template-button" data-template="t3636">
                <span>(3, 6, 3, 6)</span>
                <small>4조각</small>
              </button>
              <button class="template-button" data-template="t33336">
                <span>(3⁴, 6)</span>
                <small>5조각</small>
              </button>
              <button class="template-button" data-template="t33434">
                <span>(3², 4, 3, 4)</span>
                <small>5조각</small>
              </button>
              <button class="template-button" data-template="t33344">
                <span>(3³, 4²)</span>
                <small>5조각</small>
              </button>
            </div>
          </div>

          <div id="decoratePanel" class="panel-section decorate-panel" hidden>
            <h2>꾸밀 물건</h2>
            <div class="object-picker" role="group" aria-label="꾸밀 물건 선택">
              <button class="object-button active" data-object="clock">
                <span class="object-icon clock-object-icon"></span>
                <span>시계</span>
              </button>
              <button class="object-button" data-object="suitcase">
                <span class="object-icon suitcase-object-icon"></span>
                <span>캐리어</span>
              </button>
              <button class="object-button" data-object="window">
                <span class="object-icon window-object-icon"></span>
                <span>창문</span>
              </button>
            </div>
            <label class="object-size-control">
              <span>물건 크기</span>
              <input id="objectSizeRange" type="range" min="115" max="300" step="5" value="115" />
              <output id="objectSizeLabel">115%</output>
            </label>
          </div>

          <div class="panel-section">
            <h2>도형 고르기</h2>
            <p class="tool-note">도형을 고르면 아래에 색깔별 도형이 나타납니다.</p>
            <div class="segmented" role="group" aria-label="도형 선택">
              <button class="shape-button active" data-shape="triangle" aria-pressed="true">
                <span class="shape-icon triangle-icon"></span>
                정삼각형
              </button>
              <button class="shape-button" data-shape="square" aria-pressed="false">
                <span class="shape-icon square-icon"></span>
                정사각형
              </button>
              <button class="shape-button" data-shape="hexagon" aria-pressed="false">
                <span class="shape-icon hexagon-icon"></span>
                정육각형
              </button>
              <button class="shape-button" data-shape="octagon" aria-pressed="false">
                <span class="shape-icon octagon-icon"></span>
                정팔각형
              </button>
              <button class="shape-button" data-shape="dodecagon" aria-pressed="false">
                <span class="shape-icon dodecagon-icon"></span>
                정십이각형
              </button>
            </div>
          </div>

          <div class="panel-section">
            <h2>색깔 도형</h2>
            <div id="paletteTray" class="palette-tray" aria-label="색깔 도형 팔레트"></div>
          </div>

          <div class="panel-section compact-actions">
            <button id="undoButton" class="command-button ghost">되돌리기</button>
            <button id="clearButton" class="command-button ghost">비우기</button>
          </div>
        </aside>

        <section class="board-area">
          <div class="board-header">
            <div>
              <h2 id="boardTitle">같은 길이의 변으로 붙이기</h2>
              <p id="boardHint">빈 곳: 화면 이동 · 도형: 이동/회전</p>
            </div>
            <div class="board-actions">
              <span id="templateStatus" class="template-status" hidden></span>
              <button id="completeButton" class="command-button complete-button" hidden>완성</button>
              <button id="groupMoveButton" class="command-button group-move-button" type="button" title="묶어서 옮기기" aria-pressed="false">묶음 이동</button>
              <button id="shareButton" class="command-button share-button" type="button" title="공유게시판에 올리기">공유</button>
              <button id="downloadButton" class="command-button save-button" title="PNG로 저장">저장</button>
              <div class="viewport-controls" aria-label="화면 보기 조절">
                <button id="rotateViewButton" class="viewport-button" type="button" title="화면 90도 회전" aria-label="화면 90도 회전">↻</button>
                <button id="zoomOutButton" class="viewport-button" type="button" title="화면 축소" aria-label="화면 축소">−</button>
                <span id="zoomLabel" class="zoom-label">100%</span>
                <button id="zoomInButton" class="viewport-button" type="button" title="화면 확대" aria-label="화면 확대">+</button>
              </div>
            </div>
          </div>
          <svg id="tessellationBoard" class="board" role="application" aria-label="테셀레이션 작업판">
            <defs>
              <clipPath id="decorateClip" clipPathUnits="userSpaceOnUse"></clipPath>
            </defs>
            <g id="viewportLayer">
              <g id="templateLayer"></g>
              <g id="tileLayer"></g>
              <g id="objectLayer"></g>
            </g>
          </svg>
          <section id="communityPanel" class="community-panel" aria-label="공유게시판" hidden>
            <div class="community-header">
              <div>
                <h2>공유게시판</h2>
                <p id="communityHint">입장한 친구들이 만든 보드를 이 기기에서 함께 볼 수 있어요.</p>
              </div>
              <button id="closeCommunityButton" class="command-button ghost" type="button">닫기</button>
            </div>
            <div id="communityList" class="community-list"></div>
          </section>
        </section>
      </section>
    </main>

    <div id="guideOverlay" class="guide-overlay" hidden>
      <div id="guideSpotlight" class="guide-spotlight"></div>
      <div id="guideBubble" class="guide-bubble" role="dialog" aria-label="처음 안내">
        <p id="guideText"></p>
        <div class="guide-actions">
          <button id="guideSkipButton" class="guide-button ghost" type="button">닫기</button>
          <button id="guideNextButton" class="guide-button" type="button">다음</button>
        </div>
      </div>
    </div>

    <script src="./app.js?v=20260618-pwa"></script>
  </body>
</html>
